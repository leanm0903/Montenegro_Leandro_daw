<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
         <input type="text" id="location" name="location" placeholder="Enter location">
         <button  onclick="getLocation()">    
            Buscar
         </button>

        <div id="card">
            <p>Resultado:</p>
            <p id="city"></p>
            Temperatura: <span id="temperature"></span>
            <p>Viento: <span id="windspeed"></span></p>
            <p>Codigo: <span id="weathercode"></span></p>
         </div>
         <div id="error-message">Tuvimos problemas para conectarnos</div>
    </body>
    <script src="js/app.js"></script>
</html>
